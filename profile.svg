<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0f1923"/>
      <stop offset="100%" stop-color="#060d13"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-strong">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="400" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <g opacity="0.04" stroke="#00ffcc" stroke-width="0.5">
    <line x1="0" y1="40" x2="400" y2="40"/>
    <line x1="0" y1="80" x2="400" y2="80"/>
    <line x1="0" y1="120" x2="400" y2="120"/>
    <line x1="0" y1="160" x2="400" y2="160"/>
    <line x1="0" y1="200" x2="400" y2="200"/>
    <line x1="0" y1="240" x2="400" y2="240"/>
    <line x1="0" y1="280" x2="400" y2="280"/>
    <line x1="0" y1="320" x2="400" y2="320"/>
    <line x1="0" y1="360" x2="400" y2="360"/>
    <line x1="40" y1="0" x2="40" y2="400"/>
    <line x1="80" y1="0" x2="80" y2="400"/>
    <line x1="120" y1="0" x2="120" y2="400"/>
    <line x1="160" y1="0" x2="160" y2="400"/>
    <line x1="200" y1="0" x2="200" y2="400"/>
    <line x1="240" y1="0" x2="240" y2="400"/>
    <line x1="280" y1="0" x2="280" y2="400"/>
    <line x1="320" y1="0" x2="320" y2="400"/>
    <line x1="360" y1="0" x2="360" y2="400"/>
  </g>

  <!-- Circuit traces -->
  <g stroke="#00ffcc" stroke-width="1.5" fill="none" opacity="0.35" filter="url(#glow)">
    <!-- Top left branch -->
    <polyline points="40,40 40,80 80,80 80,120 120,120"/>
    <polyline points="80,40 80,60 120,60 120,40"/>
    <!-- Bottom right branch -->
    <polyline points="360,360 360,320 320,320 320,280 280,280"/>
    <polyline points="320,360 320,340 280,340 280,360"/>
    <!-- Top right -->
    <polyline points="360,40 320,40 320,80 280,80 280,120"/>
    <!-- Bottom left -->
    <polyline points="40,360 80,360 80,320 120,320 120,280"/>
  </g>

  <!-- Circuit nodes (dots) -->
  <g fill="#00ffcc" opacity="0.5" filter="url(#glow)">
    <circle cx="40" cy="80" r="3"/>
    <circle cx="80" cy="80" r="3"/>
    <circle cx="80" cy="120" r="3"/>
    <circle cx="120" cy="120" r="3"/>
    <circle cx="80" cy="60" r="3"/>
    <circle cx="120" cy="60" r="3"/>
    <circle cx="360" cy="320" r="3"/>
    <circle cx="320" cy="320" r="3"/>
    <circle cx="320" cy="280" r="3"/>
    <circle cx="280" cy="280" r="3"/>
    <circle cx="320" cy="340" r="3"/>
    <circle cx="280" cy="340" r="3"/>
    <circle cx="320" cy="80" r="3"/>
    <circle cx="280" cy="80" r="3"/>
    <circle cx="280" cy="120" r="3"/>
    <circle cx="80" cy="320" r="3"/>
    <circle cx="120" cy="320" r="3"/>
    <circle cx="120" cy="280" r="3"/>
  </g>

  <!-- Hex text — corners -->
  <g font-family="monospace" font-size="9" fill="#00ffcc" opacity="0.3">
    <text x="14" y="12">0x4448</text>
    <text x="330" y="12">0xA1B2</text>
    <text x="14" y="395">0xFF00</text>
    <text x="325" y="395">0x7E3C</text>
  </g>

  <!-- Binary strip top -->
  <text font-family="monospace" font-size="7.5" fill="#00ffcc" opacity="0.15" x="50" y="22" letter-spacing="2">
    01001101 01001000 01001110 00100000
  </text>
  <!-- Binary strip bottom -->
  <text font-family="monospace" font-size="7.5" fill="#00ffcc" opacity="0.15" x="50" y="385" letter-spacing="2">
    01000100 01001000 01001110 00100000
  </text>

  <!-- Outer ring -->
  <circle cx="200" cy="200" r="115" fill="none" stroke="#00ffcc" stroke-width="1" opacity="0.2"/>
  <circle cx="200" cy="200" r="118" fill="none" stroke="#00ffcc" stroke-width="0.4" opacity="0.1" stroke-dasharray="6 4"/>

  <!-- Inner dark circle backing -->
  <circle cx="200" cy="200" r="112" fill="#060d13" opacity="0.85"/>

  <!-- Tick marks on ring -->
  <g stroke="#00ffcc" stroke-width="1.5" opacity="0.4">
    <line x1="200" y1="82" x2="200" y2="72"/>
    <line x1="200" y1="318" x2="200" y2="328"/>
    <line x1="82" y1="200" x2="72" y2="200"/>
    <line x1="318" y1="200" x2="328" y2="200"/>
    <line x1="119" y1="119" x2="112" y2="112"/>
    <line x1="281" y1="119" x2="288" y2="112"/>
    <line x1="119" y1="281" x2="112" y2="288"/>
    <line x1="281" y1="281" x2="288" y2="288"/>
  </g>

  <!-- Monogram DH -->
  <text
    x="200" y="222"
    font-family="'Courier New', monospace"
    font-size="100"
    font-weight="bold"
    text-anchor="middle"
    fill="#00ffcc"
    opacity="0.95"
    filter="url(#glow-strong)"
    letter-spacing="-4"
  >DH</text>

  <!-- Underline label -->
  <text
    x="200" y="258"
    font-family="monospace"
    font-size="11"
    text-anchor="middle"
    fill="#00ffcc"
    opacity="0.55"
    letter-spacing="5"
  >DEV</text>

  <!-- Terminal prompt line -->
  <text
    x="200" y="296"
    font-family="monospace"
    font-size="10"
    text-anchor="middle"
    fill="#00ffcc"
    opacity="0.4"
  >$ python claude_buddy.py</text>

  <!-- Cursor blink (static) -->
  <rect x="317" y="284" width="7" height="11" fill="#00ffcc" opacity="0.6"/>
</svg>
